<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataCrunch — Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 4px 28px rgba(27,42,74,0.13); padding: 44px 40px; width: 100%; max-width: 420px; }
    .logo { text-align: center; font-size: 28px; font-weight: 800; color: #1B2A4A; margin-bottom: 6px; }
    .logo span { color: #3DAA5C; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #1B2A4A; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 13px; border: 1.5px solid #D0DAE8;
      border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1B2A4A; }
    .btn {
      width: 100%; padding: 13px; background: #1B2A4A; color: #fff;
      border: none; border-radius: 9px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .btn:hover { background: #243559; }
    .btn:disabled { background: #9BB0C7; cursor: not-allowed; }
    .error { background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 8px; padding: 11px 14px; color: #C0392B; font-size: 13px; margin-bottom: 16px; display: none; }
    .register-link { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
    .register-link a { color: #3DAA5C; font-weight: 700; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
    .back-link { text-align: center; margin-top: 12px; }
    .back-link a { font-size: 12px; color: #AAA; text-decoration: none; }
    .back-link a:hover { color: #666; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Data<span>Crunch</span></div>
  <div class="subtitle">Analyse financière M&A</div>

  <div class="error" id="error"></div>

  <form id="form">
    <label>Email</label>
    <input type="email" id="email" placeholder="vous@entreprise.com" required />

    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" required />

    <button type="submit" class="btn" id="btn">Se connecter</button>
  </form>

  <div class="register-link">Pas encore de compte ? <a href="register.html">Créer un compte gratuit</a></div>
  <div class="back-link"><a href="index.html">← Retour à l'accueil</a></div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('dc_token')) {
    window.location.href = '/dashboard';
  }

  document.getElementById('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const errDiv = document.getElementById('error');
    errDiv.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Connexion...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Connexion échouée');
      localStorage.setItem('dc_token', data.access_token);
      window.location.href = '/dashboard';
    } catch (err) {
      errDiv.textContent = err.message;
      errDiv.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  });
</script>
</body>
</html>
